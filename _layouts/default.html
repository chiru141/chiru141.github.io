    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/main.css" | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body>
    <header class="container site-header">
        <nav>
            <a href="{{ "/" | relative_url }}" class="logo">{{ site.title | uppercase }}</a>
            <div class="nav-links">
                <a href="{{ "/" | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
                <a href="{{ "/category/industrial/" | relative_url }}" {% if page.url contains "/category/industrial" %}class="active"{% endif %}>Tech &amp; Policy</a>
                <a href="{{ "/Paintings/" | relative_url }}" {% if page.url contains "/Paintings/" %}class="active"{% endif %}>Art &amp; Culture</a>   
                <a href="{{ "/category/notes/" | relative_url }}" {% if page.url contains "/category/notes" %}class="active"{% endif %}>Notes &amp; Reflections</a>
                <a href="{{ "/about/" | relative_url }}" {% if page.url contains "about" %}class="active"{% endif %}>About</a>
            </div>
        </nav>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-contact">
                <div class="footer-social-icons">
                  <a href="https://twitter.com/rchiru141997" class="footer-icon-link" aria-label="Twitter">

                  </a>
                  <a href="https://www.linkedin.com/in/ruchi141/" class="footer-icon-link" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                  </a>
                  <a href="mailto:r.agarwal141@yahoo.in" class="footer-icon-link" aria-label="Email">
                    <i class="fas fa-envelope"></i>
                  </a>
                </div>
                <p class="footer-note">Thoughts? I'd love to hear them.</p>
              </div>
