<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/main.css" | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="container site-header">
        <nav>
            <a href="{{ "/" | relative_url }}" class="logo">{{ site.title | uppercase }}</a>
            <div class="nav-links">
                <a href="{{ "/" | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
                <a href="{{ "/category/industrial/" | relative_url }}" {% if page.url contains "/category/industrial" %}class="active"{% endif %}>Tech &amp; Policy</a>
                <a href="{{ "/Paintings/" | relative_url }}" {% if page.url contains "/Paintings/" %}class="active"{% endif %}>Art &amp; Culture</a>
        <!--       <a href="{{ "/category/culture/" | relative_url }}" {% if page.url contains "/category/culture" %}class="active"{% endif %}>Art &amp; Culture</a>             -->   
                <a href="{{ "/category/notes/" | relative_url }}" {% if page.url contains "/category/notes" %}class="active"{% endif %}>Notes &amp; Reflections</a>
                <a href="{{ "/about/" | relative_url }}" {% if page.url contains "about" %}class="active"{% endif %}>About</a>
            </div>
        </nav>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-contact">
                <div class="footer-social-icons">
                  <a href="https://twitter.com/chiru141997" class="footer-icon-link" aria-label="Twitter">
                    <i class="fab fa-twitter"></i>
                  </a>
                  <a href="https://www.linkedin.com/in/ruchi141/" class="footer-icon-link" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                  </a>
                  <a href="mailto:{{ site.email }}" class="footer-icon-link" aria-label="Email">
                    <i class="fas fa-envelope"></i>
                  </a>
                </div>
                <p class="footer-note">Thoughts? I'd love to hear them.</p>
              </div>
         <!--  <div class="footer-contact">
                <a href="mailto:{{ site.email }}" class="footer-link">Reply via Email</a>
                <p class="footer-note">Thoughts? I'd love to hear them.</p>
                - {title: Twitter, icon: twitter, url: "https://twitter.com/chiru141997"} 
                - {title: LinkedIn, icon: linkedin, url: "https://www.linkedin.com/in/ruchi141/"}
                - {title: Mail, icon: envelope, url: "mailto:r.agarwal141@yahoo.in"}
            </div> -->
            <div class="footer-meta">
                <span class="copyright">© {{ "now" | date: "%Y" }} • Built with Intent</span>
            </div>
        </div>
    </footer>

    <!-- GoatCounter analytics placeholder -->
    <script data-goatcounter="https://YOURCODE.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
