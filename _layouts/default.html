<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/main.css" | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="container">
        <nav>
            <a href="{{ "/" | relative_url }}" class="logo">{{ site.title | uppercase }}</a>
            <div class="nav-links">
                <a href="{{ "/" | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
                <a href="{{ "/problem-stack.html" | relative_url }}" {% if page.url contains "problem-stack" %}class="active"{% endif %}>Problem Stack</a>
                <a href="{{ "/about.html" | relative_url }}" {% if page.url contains "about" %}class="active"{% endif %}>About</a>
            </div>
        </nav>
        {% if page.url == "/" %}
        <div class="hero">
            <h1>Welcome.</h1>
            <p class="serif-italic">{{ site.description }}</p>
        </div>
        {% endif %}
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-contact">
                <a href="mailto:{{ site.email }}" class="footer-link">Reply via Email</a>
                <p class="footer-note">Thoughts? I'd love to hear them.</p>
            </div>
            <div class="footer-meta">
                <span class="copyright">© {{ "now" | date: "%Y" }} • Built with Intent</span>
                <span class="analytics-status">Analytics Active</span>
            </div>
        </div>
    </footer>

    <!-- GoatCounter analytics placeholder -->
    <script data-goatcounter="https://YOURCODE.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
